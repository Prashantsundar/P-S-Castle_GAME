<title>P S CASTLE</title>
<style>
  :root{ --bezel:#0b0b12; }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ width:100%; height:100%; overflow:hidden; background:var(--bezel); touch-action:none; }
  body{ display:flex; align-items:center; justify-content:center;
        font-family:monospace; user-select:none; -webkit-user-select:none; }
  #stage{ position:relative; }
  canvas{ display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
  /* subtle CRT glass */
  #crt{ position:absolute; inset:0; pointer-events:none; mix-blend-mode:overlay; opacity:.55;
        background:
          repeating-linear-gradient(0deg, rgba(0,0,0,.22) 0 1px, transparent 1px 3px),
          radial-gradient(120% 90% at 50% 45%, transparent 60%, rgba(0,0,0,.45) 100%); }
  @media (prefers-reduced-motion: no-preference){
    #crt::after{ content:""; position:absolute; inset:0;
      background:linear-gradient(rgba(255,255,255,.035), transparent 30%);
      animation:flick 4s steps(2) infinite; }
    @keyframes flick{ 0%,100%{opacity:.5} 50%{opacity:.8} }
  }
  /* ---------- touch controls ---------- */
  #touch{ position:fixed; inset:0; display:none; pointer-events:none; z-index:5; }
  body.touchmode #touch{ display:block; }
  .tbtn{ position:absolute; pointer-events:auto; display:flex; align-items:center; justify-content:center;
         border:2px solid rgba(255,255,255,.28); border-radius:14px;
         background:rgba(255,255,255,.07); color:rgba(255,255,255,.75);
         font:bold 13px monospace; letter-spacing:1px; backdrop-filter:blur(2px);
         width:64px; height:64px; }
  .tbtn:active,.tbtn.on{ background:rgba(255,255,255,.22); }
  #tL{ left:calc(14px + env(safe-area-inset-left)); bottom:calc(20px + env(safe-area-inset-bottom)); }
  #tR{ left:calc(92px + env(safe-area-inset-left)); bottom:calc(20px + env(safe-area-inset-bottom)); }
  #tJump{ right:calc(14px + env(safe-area-inset-right)); bottom:calc(88px + env(safe-area-inset-bottom)); }
  #tFire{ right:calc(92px + env(safe-area-inset-right)); bottom:calc(20px + env(safe-area-inset-bottom)); }
  #tJet{ right:calc(14px + env(safe-area-inset-right)); bottom:calc(170px + env(safe-area-inset-bottom));

const TILE=16, ROWS=10, VIEW_TILES=20;
const W=VIEW_TILES*TILE;            // 320
const HUD_TOP=22, HUD_BOT=22;
const FIELD_H=ROWS*TILE;            // 160
const H=HUD_TOP+FIELD_H+HUD_BOT;    // 204

const cv=document.getElementById('game');
const ctx=cv.getContext('2d');
cv.width=W; cv.height=H;
ctx.imageSmoothingEnabled=false;

/* ---------- responsive scaling (any device / resolution) ---------- */
function fit(){
  const ww=window.innerWidth, wh=window.innerHeight;
  let s=Math.min(ww/W, wh/H);
  if(s>1) s=Math.max(1, Math.floor(s));      // integer scale for crisp pixels
  cv.style.width=(W*s)+'px'; cv.style.height=(H*s)+'px';
}
addEventListener('resize',fit); addEventListener('orientationchange',fit); fit();

function text(s,x,y,col,sc){
  sc=sc||1; ctx.fillStyle=col;
  for(let i=0;i<s.length;i++){
    const g=FONT[s[i]]||FONT[' '];
    for(let r=0;r<5;r++)for(let c=0;c<3;c++)
      if(g[r]>>(2-c)&1) ctx.fillRect(x+i*4*sc+c*sc, y+r*sc, sc, sc);
  }
}
function textC(s,cx,y,col,sc){ sc=sc||1; text(s,Math.round(cx-(s.length*4*sc-sc)/2),y,col,sc); }

/* ---------- sound: PC-speaker style WebAudio synth ---------- */
let AC=null, muted=false, jetOsc=null;
function audio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); }
function tone(f0,f1,t,dur,vol,type){
  if(!AC||muted)return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'square';
  o.frequency.setValueAtTime(f0,t);
  if(f1!==f0)o.frequency.linearRampToValueAtTime(f1,t+dur);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t+dur+.02);
}
const SFX={
  jump(){ if(!AC)return; tone(180,520,AC.currentTime,.14,.12); },
  step(){ if(!AC)return; tone(90,70,AC.currentTime,.04,.05); },
  gem(){ if(!AC)return; const t=AC.currentTime; tone(880,880,t,.06,.1); tone(1320,1320,t+.06,.09,.1); },
  big(){ if(!AC)return; const t=AC.currentTime; [660,880,1100,1320].forEach((f,i)=>tone(f,f,t+i*.06,.08,.11)); },
  trophy(){ if(!AC)return; const t=AC.currentTime; [523,659,784,1046,784,1046].forEach((f,i)=>tone(f,f,t+i*.09,.1,.12)); },
  door(){ if(!AC)return; const t=AC.currentTime; [392,523,659,784,1046,1318].forEach((f,i)=>tone(f,f,t+i*.08,.1,.12)); },
  shoot(){ if(!AC)return; tone(900,140,AC.currentTime,.1,.1,'sawtooth'); },
  hitmon(){ if(!AC)return; const t=AC.currentTime; tone(300,60,t,.18,.14,'sawtooth'); tone(150,40,t,.2,.1); },
  die(){ if(!AC)return; const t=AC.currentTime; for(let i=0;i<8;i++)tone(600-i*65,560-i*65,t+i*.07,.07,.13); },
  life(){ if(!AC)return; const t=AC.currentTime; [523,659,784,1046].forEach((f,i)=>tone(f,f,t+i*.07,.09,.12)); },
  pickup(){ if(!AC)return; const t=AC.currentTime; tone(440,660,t,.08,.11); tone(660,990,t+.08,.1,.11); },
  land(){ if(!AC)return; tone(130,70,AC.currentTime,.06,.09); },
  locked(){ if(!AC)return; const t=AC.currentTime; tone(160,140,t,.09,.11); tone(120,100,t+.1,.12,.11); },
  eshoot(){ if(!AC)return; tone(520,240,AC.currentTime,.08,.06,'sawtooth'); },
  start(){ if(!AC)return; const t=AC.currentTime; [523,784,1046].forEach((f,i)=>tone(f,f,t+i*.07,.09,.12)); },
  pause(){ if(!AC)return; tone(700,700,AC.currentTime,.05,.08); },
  jetOn(){ if(!AC||muted||jetOsc)return;
    const o=AC.createOscillator(), g=AC.createGain(), l=AC.createOscillator(), lg=AC.createGain();
    o.type='sawtooth'; o.frequency.value=70; g.gain.value=.05;
    l.frequency.value=28; lg.gain.value=18; l.connect(lg).connect(o.frequency);
    o.connect(g).connect(AC.destination); o.start(); l.start(); jetOsc={o,g,l};
  },
  jetOff(){ if(jetOsc){ try{jetOsc.o.stop();jetOsc.l.stop();}catch(e){} jetOsc=null; } }
};

  map=L.rows.map(r=>r.padEnd(mapW,' ').split(''));

  P.gun=false; P.jet=false; P.jetOn=false; P.fuel=0; P.trophy=false; SFX.jetOff();
  for(let y=0;y<ROWS;y++)for(let x=0;x<mapW;x++){
    const ch=map[y][x];
    if(ch==='S'){ P.startX=x*TILE+3; P.startY=y*TILE+2; map[y][x]=' '; }
    if(ch==='M'){ monsters.push({kind:0,x:x*TILE,y:y*TILE,ox:x*TILE,oy:y*TILE,t:Math.random()*99,cool:100,hp:1}); map[y][x]=' '; }
    if(ch==='N'){ monsters.push({kind:1,x:x*TILE,y:y*TILE,ox:x*TILE,oy:y*TILE,t:Math.random()*99,cool:120,hp:1}); map[y][x]=' '; }
    if(ch==='O'){ monsters.push({kind:2,x:x*TILE,y:y*TILE,ox:x*TILE,oy:y*TILE,t:Math.random()*99,cool:140,hp:1}); map[y][x]=' '; }
  }
  respawn();
}
function respawn(){ P.x=P.startX; P.y=P.startY; P.vx=0; P.vy=0; P.face=1; P.jetOn=false; SFX.jetOff(); cam=Math.max(0,Math.min(Math.floor(P.x/(9*TILE))*9*TILE, mapW*TILE-W)); camT=cam; }

function tileAt(px,py){ const tx=Math.floor(px/TILE), ty=Math.floor(py/TILE);
  if(tx<0||tx>=mapW||ty<0||ty>=ROWS)return '#'; return map[ty][tx]; }
function solidAt(px,py){ return SOLID.includes(tileAt(px,py)); }

function addScore(n){ score+=n; if(score>=nextLife){ nextLife+=20000; if(lives<6){lives++; SFX.life(); toast='EXTRA LIFE!'; toastT=90;} } if(score>hi){hi=score; saveHi();} }
let toast='', toastT=0, airT=0, lockedCd=0;

/* ---------- input ---------- */
const K={l:false,r:false,jump:false,fire:false,jetT:false,enter:false};
let jumpLatch=false, fireLatch=false, jetLatch=false, enterLatch=false;
function setKey(e,down){
  const c=e.code;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','ControlLeft','ControlRight','AltLeft','AltRight'].includes(c))e.preventDefault();
  if(c==='ArrowLeft')K.l=down;
  if(c==='ArrowRight')K.r=down;
  if(c==='ArrowUp'||c==='ControlLeft'||c==='ControlRight'||c==='KeyZ')K.jump=down;
  if(c==='AltLeft'||c==='AltRight'||c==='KeyX')K.fire=down;
  if(c==='Space')K.jetT=down;
  if(c==='Enter')K.enter=down;
  if(c==='Space'&&state!=='play'&&state!=='pause')K.enter=down;
  if(down&&c==='KeyM'){ muted=!muted; if(muted)SFX.jetOff(); }
  if(down&&(c==='KeyP'||c==='Escape')){ if(state==='play'){state='pause';SFX.pause();} else if(state==='pause'){state='play';SFX.pause();} }
  if(down)audio();
}
addEventListener('keydown',e=>setKey(e,true));
addEventListener('keyup',e=>setKey(e,false));

/* touch */
const isTouch=matchMedia('(pointer: coarse)').matches;
if(isTouch)document.body.classList.add('touchmode');
function bindBtn(id,fn){ const el=document.getElementById(id);
  const on=e=>{e.preventDefault(); audio(); el.classList.add('on'); fn(true);};
  const off=e=>{e.preventDefault(); el.classList.remove('on'); fn(false);};
  el.addEventListener('touchstart',on,{passive:false}); el.addEventListener('touchend',off);
  el.addEventListener('touchcancel',off);
  el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
}
bindBtn('tL',d=>K.l=d); bindBtn('tR',d=>K.r=d);
bindBtn('tJump',d=>{K.jump=d; if(d&&state!=='play')K.enter=d;});
bindBtn('tFire',d=>K.fire=d); bindBtn('tJet',d=>K.jetT=d);
cv.addEventListener('touchstart',e=>{e.preventDefault(); audio(); if(state!=='play')K.enter=true;},{passive:false});
cv.addEventListener('touchend',()=>{K.enter=false;});
cv.addEventListener('mousedown',()=>{ audio(); if(state!=='play')K.enter=true; });
cv.addEventListener('mouseup',()=>{K.enter=false;});

/* ---------- physics ---------- */
const GRAV=.25, MOVE=1.5, JUMPV=-4.6, JETV=1.5;
function moveAxis(dx,dy){
  P.x+=dx;
  if(dx){ const dir=dx>0?1:-1, edge=dx>0?P.x+P.w:P.x;
    for(const py of [P.y+1,P.y+P.h/2,P.y+P.h-1])
      if(solidAt(edge,py)){ P.x=dx>0?Math.floor(edge/TILE)*TILE-P.w-0.01:(Math.floor(edge/TILE)+1)*TILE+0.01; P.vx=0; }
  }
  P.y+=dy;
  if(dy){ const edge=dy>0?P.y+P.h:P.y;
    for(const px of [P.x+1,P.x+P.w-1])
      if(solidAt(px,edge)){
        if(dy>0){ P.y=Math.floor(edge/TILE)*TILE-P.h-0.01; P.vy=0; P.ground=true; }
        else{ P.y=(Math.floor(edge/TILE)+1)*TILE+0.01; P.vy=0; }
      }
  }
}
function overlapTile(ch){
  for(const px of [P.x+2,P.x+P.w-2]) for(const py of [P.y+3,P.y+P.h-2])
    if(tileAt(px,py)===ch)return {x:Math.floor(px/TILE),y:Math.floor(py/TILE)};
  return null;
}
function boom(x,y,col,n){ for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3-1,t:30+Math.random()*20,col}); }
let deathX=0, deathY=0;
function die(){ if(state!=='play')return; state='dying'; stateT=0; SFX.jetOff(); SFX.die(); shake=8;
  deathX=P.x+P.w/2; deathY=P.y+P.h/2;
  boom(deathX,deathY,'#f97316',12); boom(deathX,deathY,'#fbbf24',8); }

/* ---------- update ---------- */
function update(){
  tick++;
  if(toastT>0)toastT--;
  if(shake>0)shake*=.85;
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.t--;return p.t>0;});

  if(state==='title'||state==='gameover'||state==='win'){
    if(K.enter&&!enterLatch){ enterLatch=true; score=0; lives=3; level=0; nextLife=20000; loadLevel(0); state='play'; SFX.start(); toast=LEVELS[0].name; toastT=100; }
    if(!K.enter)enterLatch=false; return;
  }
  if(state==='pause')return;
  if(state==='dying'){ stateT++; if(stateT>70){ lives--; if(lives<=0){state='gameover'; stateT=0;} else{respawn(); state='play';} } return; }
  if(state==='levelDone'){ stateT++; if(stateT>110){ level++; if(level>=LEVELS.length){state='win'; stateT=0;} else{loadLevel(level); state='play'; toast=LEVELS[level].name; toastT=110;} } return; }

  /* --- player --- */
  P.ground=false;
  // probe ground
  for(const px of [P.x+1,P.x+P.w-1]) if(solidAt(px,P.y+P.h+0.5))P.ground=true;
  if(P.ground){ if(airT>10)SFX.land(); airT=0; } else airT++;
  if(lockedCd>0)lockedCd--;

  if(K.jetT&&!jetLatch){ jetLatch=true;
    if(P.jet&&P.fuel>0){ P.jetOn=!P.jetOn; if(P.jetOn)SFX.jetOn(); else SFX.jetOff(); } }
  if(!K.jetT)jetLatch=false;

  if(P.jetOn&&P.fuel>0){
    P.fuel-=.06; if(P.fuel<=0){P.fuel=0;P.jetOn=false;SFX.jetOff();}
    P.vx=(K.l?-JETV:0)+(K.r?JETV:0); P.vy=(K.jump?-JETV:0)+((K.fire&&false)?0:0);
    // vertical: up with jump key, down with nothing -> hover; ArrowDown support:
    P.vy=0; if(K.jump)P.vy=-JETV; if(keysDown.ArrowDown)P.vy=JETV;
    if(K.l)P.face=-1; if(K.r)P.face=1;
    if(tick%5===0)parts.push({x:P.x+P.w/2-P.face*5,y:P.y+P.h-2,vx:-P.face*.8,vy:.6,t:14,col:tick%10?'#f97316':'#fbbf24'});
  }else{
    P.vx=0; if(K.l){P.vx=-MOVE;P.face=-1;} if(K.r){P.vx=MOVE;P.face=1;}
    if(K.jump&&!jumpLatch&&P.ground){ P.vy=JUMPV; jumpLatch=true; SFX.jump(); }
    if(!K.jump)jumpLatch=false;
    P.vy+=GRAV; if(P.vy>4.5)P.vy=4.5;
    if(P.ground&&P.vx&&tick%14===0)SFX.step();
  }
  moveAxis(P.vx,0); moveAxis(0,P.vy);
  if(P.jetOn)P.anim+=.2; else if(P.vx)P.anim+=.18; else P.anim=0;
  P.x=Math.max(0,Math.min(P.x,mapW*TILE-P.w));
  if(P.y>ROWS*TILE+8)return die();

  /* camera: chunked screen scroll, classic style */
  if(camT===cam){
    if(P.x-cam > W-5*TILE) camT=Math.min(cam+9*TILE, mapW*TILE-W);
    if(P.x-cam < 4*TILE && cam>0) camT=Math.max(cam-9*TILE, 0);
  }
  if(cam<camT)cam=Math.min(cam+10,camT);
  if(cam>camT)cam=Math.max(cam-10,camT);

  /* pickups & hazards & door */
  for(const it of 'gurcTGJ'){ const hit=overlapTile(it); if(hit){
    map[hit.y][hit.x]=' ';
    if(it==='T'){ P.trophy=true; addScore(1000); SFX.trophy(); banner=1; boom(hit.x*16+8,hit.y*16+8,'#fbbf24',12); }
    else if(it==='G'){ P.gun=true; SFX.pickup(); toast='GUN!'; toastT=70; }
    else if(it==='J'){ P.jet=true; P.fuel=100; SFX.pickup(); toast='JETPACK! PRESS SPACE'; toastT=110; }
    else{ addScore(VALUES[it]); (it==='g'?SFX.gem:SFX.big)(); boom(hit.x*16+8,hit.y*16+8,'#93c5fd',6); }
  }}
  for(const hz of HAZARD)if(overlapTile(hz))return die();
  const door=overlapTile('D');
  if(door&&P.trophy){ state='levelDone'; stateT=0; addScore(2000); SFX.door(); SFX.jetOff(); }
  else if(door&&!P.trophy&&lockedCd<=0){ SFX.locked(); toast='FIND THE TROPHY FIRST!'; toastT=70; lockedCd=80; }

  /* --- player bullet --- */
  if(K.fire&&!fireLatch){ fireLatch=true;
    if(P.gun&&!pBullet){ pBullet={x:P.x+(P.face>0?P.w:0),y:P.y+7,vx:P.face*4}; SFX.shoot(); } }
  if(!K.fire)fireLatch=false;
  if(pBullet){ pBullet.x+=pBullet.vx;
    if(pBullet.x<cam-8||pBullet.x>cam+W+8||solidAt(pBullet.x,pBullet.y))pBullet=null;
    else for(const m of monsters){ if(m.hp>0&&pBullet&&Math.abs(pBullet.x-(m.x+8))<9&&Math.abs(pBullet.y-(m.y+7))<9){
      m.hp=0; addScore(300); SFX.hitmon(); boom(m.x+8,m.y+8,'#a855f7',12); pBullet=null; } } }

  /* --- monsters --- */
  for(const m of monsters){ if(m.hp<=0)continue; m.t+=.03;
    if(m.kind===0){ m.x=m.ox+Math.sin(m.t*2)*26; }
    if(m.kind===1){ m.y=m.oy+Math.sin(m.t*2)*22; }
    if(m.kind===2){ m.x=m.ox+Math.sin(m.t*1.6)*34; m.y=m.oy+Math.sin(m.t*3.2)*12; }
    // shoot at player when visible
    m.cool--;
    if(m.cool<=0&&Math.abs(m.x-P.x)<W*0.7){
      const dx=P.x+P.w/2-(m.x+8), dy=P.y+P.h/2-(m.y+7), d=Math.hypot(dx,dy)||1;
      eBullets.push({x:m.x+8,y:m.y+7,vx:dx/d*1.6,vy:dy/d*1.6,t:200}); SFX.eshoot();
      m.cool=110+Math.random()*90;
    }
    if(Math.abs(m.x+8-(P.x+P.w/2))<10&&Math.abs(m.y+7-(P.y+P.h/2))<11)return die();
  }
  eBullets=eBullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; b.t--;
    if(b.t<=0||solidAt(b.x,b.y))return false;
    if(b.x>P.x&&b.x<P.x+P.w&&b.y>P.y&&b.y<P.y+P.h){ die(); return false; }
    return true; });
}
const keysDown={};
addEventListener('keydown',e=>keysDown[e.code]=true);
addEventListener('keyup',e=>keysDown[e.code]=false);

/* ---------- render ---------- */
function drawTileGfx(ch,x,y){
  switch(ch){
    case '#': ctx.drawImage(T_BRICK,x,y); break;
    case '=': ctx.drawImage(T_STONE,x,y); break;
    case 'B': ctx.drawImage(T_BLUE,x,y); break;
    case 'P': ctx.drawImage(T_PIPE,x,y); break;
    case 'D': ctx.drawImage(T_DOOR,x,y);
      if(P.trophy&&(tick>>4)%2){ ctx.fillStyle='rgba(251,191,36,.5)'; ctx.fillRect(x,y,16,2); ctx.fillRect(x,y+14,16,2); }
      break;
    case 'F':{ // animated fire
      ctx.fillStyle='#7f1d1d'; ctx.fillRect(x,y+12,16,4);
      for(let i=0;i<4;i++){ const h=6+Math.sin(tick*.3+x+i*2.1)*3;
        ctx.fillStyle=i%2?'#f97316':'#ef4444'; ctx.fillRect(x+i*4+1,y+12-h,2,h);
        ctx.fillStyle='#fbbf24'; ctx.fillRect(x+i*4+1,y+12-h,2,2); }
      break; }
    case 'W':{ // water
      ctx.fillStyle='#1d4ed8'; ctx.fillRect(x,y+5,16,11);
      ctx.fillStyle='#3b82f6'; ctx.fillRect(x,y+5,16,3);
      ctx.fillStyle='#93c5fd';
      for(let i=0;i<4;i++){ const o=Math.sin(tick*.15+x*.5+i)*1.5; ctx.fillRect(x+i*4,y+5+o,3,1); }
      break; }
    case 'V':{ // vine / tentacle
      ctx.fillStyle='#166534';
      for(let i=0;i<3;i++){ const sway=Math.sin(tick*.12+x+i*2)*2;
        ctx.fillRect(x+3+i*5+sway,y+4,2,12); }
      ctx.fillStyle='#4ade80';
      ctx.fillRect(x+3+Math.sin(tick*.12+x)*2,y+4,2,3);
      ctx.fillRect(x+13+Math.sin(tick*.12+x+4)*2,y+4,2,3);
      ctx.fillStyle='#f4f4f4';
      ctx.fillRect(x+4+Math.sin(tick*.12+x)*2,y+6,1,1);
      break; }
    case 'g': ctx.drawImage(SPR_GEM,x,y+((tick>>4)%2?1:0)); break;
    case 'u': ctx.drawImage(SPR_RUBY,x,y+((tick>>4)%2?0:1)); break;
    case 'r': ctx.drawImage(SPR_RING,x,y+((tick>>4)%2?1:0)); break;
    case 'c': ctx.drawImage(SPR_CROWN,x,y); break;
    case 'T': ctx.drawImage(SPR_TROPHY[(tick>>4)%2],x,y); break;
    case 'G': ctx.drawImage(SPR_GUN,x,y); break;
    case 'J': ctx.drawImage(SPR_JET,x,y); break;
  }
}
function drawHero(){
  let img=HERO_IDLE;
  if(!P.ground&&!P.jetOn)img=HERO_JUMP;
  else if(P.vx||P.jetOn)img=(Math.floor(P.anim)%2)?HERO_W1:HERO_W2;
  const sx=Math.round(P.x-cam)-3, sy=Math.round(P.y)-2+HUD_TOP;
  ctx.save();
  if(P.face<0){ ctx.translate(sx+16,sy); ctx.scale(-1,1); ctx.drawImage(img,0,0); }
  else ctx.drawImage(img,sx,sy);
  ctx.restore();
  if(P.jet){ // little pack on back

  }
}

function bg(){
  const grad=ctx.createLinearGradient(0,HUD_TOP,0,HUD_TOP+FIELD_H);

  ctx.fillStyle=grad; ctx.fillRect(0,HUD_TOP,W,FIELD_H);
  // parallax stars
  ctx.fillStyle='rgba(255,255,255,.25)';
  for(let i=0;i<26;i++){ const x=((i*53-cam*.3)%W+W)%W, y=HUD_TOP+(i*37)%FIELD_H;
    ctx.fillRect(x,y,1,1); }

function scene(){
  bg();
  const ox=Math.round(cam), first=Math.floor(ox/TILE), last=first+VIEW_TILES+1;
  for(let ty=0;ty<ROWS;ty++)for(let tx=first;tx<=last&&tx<mapW;tx++){
    const ch=map[ty][tx]; if(ch!==' ')drawTileGfx(ch,tx*TILE-ox,ty*TILE+HUD_TOP);
  }
  for(const m of monsters){ if(m.hp<=0)continue;
    const set=[MON_SPIDER,MON_ORB,MON_BAT][m.kind];
    ctx.drawImage(set[(tick>>3)%2],Math.round(m.x-ox),Math.round(m.y)+HUD_TOP); }
  if(pBullet){ ctx.fillStyle='#f4f4f4'; ctx.fillRect(Math.round(pBullet.x-ox),Math.round(pBullet.y)+HUD_TOP,4,2); }
  ctx.fillStyle='#ef4444';
  for(const b of eBullets){ ctx.fillRect(Math.round(b.x-ox)-1,Math.round(b.y)+HUD_TOP-1,3,3); }
  if(state!=='dying')drawHero();
  else{ // classic spinning death star
    const dx=Math.round(deathX-ox), dy=Math.round(deathY)+HUD_TOP, a=stateT*.45, R=5+Math.sin(stateT*.3)*2;
    for(let i=0;i<8;i++){ const ang=a+i*Math.PI/4;
      ctx.fillStyle=i%2?'#fbbf24':'#f97316';
      ctx.fillRect(dx+Math.cos(ang)*R-1, dy+Math.sin(ang)*R-1, 3,3); }
    ctx.fillStyle='#f4f4f4'; ctx.fillRect(dx-2,dy-2,4,4); }
  for(const p of parts){ ctx.fillStyle=p.col; ctx.fillRect(Math.round(p.x-ox),Math.round(p.y)+HUD_TOP,2,2); }
}

function render(){

  scene(); hud();
  if(state==='pause')overlay('PAUSED','PRESS P TO RESUME','#f4f4f4');
  if(state==='dying'){ for(const p of parts){} }
  if(state==='levelDone')overlay('LEVEL '+(level+1)+' CLEAR!','','#4ade80');
  if(state==='gameover'){ overlay('GAME OVER',isTouch?'TAP TO RETRY':'PRESS ENTER','#ef4444');
    textC('SCORE '+String(score).padStart(6,'0'),W/2,HUD_TOP+78,'#f4f4f4'); }
  if(state==='win'){ overlay('YOU SAVED','','#fbbf24'); textC('P S CASTLE!',W/2,HUD_TOP+72,'#2dd4bf',3);
    textC('SCORE '+String(score).padStart(6,'0'),W/2,HUD_TOP+104,'#f4f4f4');
    if((tick>>5)%2)textC(isTouch?'TAP TO PLAY AGAIN':'PRESS ENTER TO PLAY AGAIN',W/2,HUD_TOP+124,'#94a3b8'); }
  ctx.restore();
}

/* ---------- main loop (fixed timestep) ---------- */
let last=0, acc=0; const STEP=1000/60;
function loop(t){
  requestAnimationFrame(loop);
  if(!last)last=t; acc+=Math.min(t-last,100); last=t;
  while(acc>=STEP){ update(); acc-=STEP; }
  render();
}
requestAnimationFrame(loop);
</script>
