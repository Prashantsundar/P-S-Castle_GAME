  #touch{ position:absolute; inset:0; display:none; pointer-events:none; z-index:5;
          --bs:64px; --br:16px; }
  body.touchmode.playing #touch{ display:block; }
  .tbtn{ position:absolute; pointer-events:auto; display:flex; align-items:center; justify-content:center;

         background:rgba(20,20,40,.35); color:rgba(255,255,255,.8);
         font:bold calc(var(--bs)*.22)/1 monospace; letter-spacing:1px;
         width:var(--bs); height:var(--bs); backdrop-filter:blur(1px); }
  .tbtn:active,.tbtn.on{ background:rgba(45,212,191,.35); border-color:rgba(45,212,191,.7); }
  #tPause{ width:calc(var(--bs)*.62); height:calc(var(--bs)*.62); font-size:calc(var(--bs)*.26); }

/* ---------- FULL-SCREEN scaling: fills the device screen ---------- */
function fit(){
  const s=Math.min(window.innerWidth/W, window.innerHeight/H); // non-integer: edge-to-edge
  cv.style.width=(W*s)+'px'; cv.style.height=(H*s)+'px';
}
addEventListener('resize',fit); addEventListener('orientationchange',()=>setTimeout(fit,150)); fit();
let isFS=false;
function toggleFullscreen(){
  const d=document;
  if(!d.fullscreenElement&&!d.webkitFullscreenElement){
    const el=d.documentElement;
    (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);
  }else{
    (d.exitFullscreen||d.webkitExitFullscreen||function(){}).call(d);
  }
}
document.addEventListener('fullscreenchange',()=>{ isFS=!!document.fullscreenElement; setTimeout(fit,100); });
document.addEventListener('webkitfullscreenchange',()=>{ isFS=!!document.webkitFullscreenElement; setTimeout(fit,100); });

function text(s,x,y,col,sc){
  sc=sc||1; ctx.fillStyle=col;
  for(let i=0;i<s.length;i++){ const g=FONT[s[i]]||FONT[' '];
    for(let r=0;r<5;r++)for(let c=0;c<3;c++)
      if(g[r]>>(2-c)&1) ctx.fillRect(x+i*4*sc+c*sc, y+r*sc, sc, sc); }
}
function textC(s,cx,y,col,sc){ sc=sc||1; text(s,Math.round(cx-(s.length*4*sc-sc)/2),y,col,sc); }

/* ---------- sound: PC-speaker style WebAudio synth ---------- */
let AC=null, muted=false, jetOsc=null;
function audio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended')AC.resume(); }
function tone(f0,f1,t,dur,vol,type){
  if(!AC||muted)return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'square'; o.frequency.setValueAtTime(f0,t);
  if(f1!==f0)o.frequency.linearRampToValueAtTime(f1,t+dur);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g).connect(AC.destination); o.start(t); o.stop(t+dur+.02);
}
const SFX={
  jump(){ if(!AC)return; tone(180,520,AC.currentTime,.14,.12); },
  step(){ if(!AC)return; tone(90,70,AC.currentTime,.04,.05); },
  gem(){ if(!AC)return; const t=AC.currentTime; tone(880,880,t,.06,.1); tone(1320,1320,t+.06,.09,.1); },
  big(){ if(!AC)return; const t=AC.currentTime; [660,880,1100,1320].forEach((f,i)=>tone(f,f,t+i*.06,.08,.11)); },
  trophy(){ if(!AC)return; const t=AC.currentTime; [523,659,784,1046,784,1046].forEach((f,i)=>tone(f,f,t+i*.09,.1,.12)); },
  door(){ if(!AC)return; const t=AC.currentTime; [392,523,659,784,1046,1318].forEach((f,i)=>tone(f,f,t+i*.08,.1,.12)); },
  shoot(){ if(!AC)return; tone(900,140,AC.currentTime,.1,.1,'sawtooth'); },
  hitmon(){ if(!AC)return; const t=AC.currentTime; tone(300,60,t,.18,.14,'sawtooth'); tone(150,40,t,.2,.1); },
  die(){ if(!AC)return; const t=AC.currentTime; for(let i=0;i<8;i++)tone(600-i*65,560-i*65,t+i*.07,.07,.13); },
  life(){ if(!AC)return; const t=AC.currentTime; [523,659,784,1046].forEach((f,i)=>tone(f,f,t+i*.07,.09,.12)); },
  pickup(){ if(!AC)return; const t=AC.currentTime; tone(440,660,t,.08,.11); tone(660,990,t+.08,.1,.11); },
  land(){ if(!AC)return; tone(130,70,AC.currentTime,.06,.09); },
  locked(){ if(!AC)return; const t=AC.currentTime; tone(160,140,t,.09,.11); tone(120,100,t+.1,.12,.11); },
  eshoot(){ if(!AC)return; tone(520,240,AC.currentTime,.08,.06,'sawtooth'); },
  start(){ if(!AC)return; const t=AC.currentTime; [523,784,1046].forEach((f,i)=>tone(f,f,t+i*.07,.09,.12)); },
  pause(){ if(!AC)return; tone(700,700,AC.currentTime,.05,.08); },
  menu(){ if(!AC)return; tone(600,600,AC.currentTime,.04,.07); },
  select(){ if(!AC)return; const t=AC.currentTime; tone(700,700,t,.05,.09); tone(1050,1050,t+.05,.07,.09); },
  jetOn(){ if(!AC||muted||jetOsc)return;
    const o=AC.createOscillator(), g=AC.createGain(), l=AC.createOscillator(), lg=AC.createGain();
    o.type='sawtooth'; o.frequency.value=70; g.gain.value=.05;
    l.frequency.value=28; lg.gain.value=18; l.connect(lg).connect(o.frequency);
    o.connect(g).connect(AC.destination); o.start(); l.start(); jetOsc={o,g,l};
  },
  jetOff(){ if(jetOsc){ try{jetOsc.o.stop();jetOsc.l.stop();}catch(e){} jetOsc=null; } }
};

/* ---------- background decorations: grass, bushes, trees (no collision) ---------- */
let deco=[];
function hash2(x,y,s){ let n=x*374761393+y*668265263+s*971; n=(n^(n>>13))*1274126177; return ((n^(n>>16))>>>0)/4294967295; }
function buildDeco(lvIdx){
  deco=[];
  for(let y=1;y<9;y++)for(let x=1;x<mapW-1;x++){
    if('#='.includes(map[y][x]) && map[y-1][x]===' '){
      const r=hash2(x,y,lvIdx);
      if(r<.30) deco.push({x,y:y-1,k:0,v:Math.floor(r*997)%3});          // grass tuft
      else if(r<.38) deco.push({x,y:y-1,k:1,v:Math.floor(r*991)%2});     // bush
      else if(r<.43 && y>2 && map[y-2][x]===' ') deco.push({x,y:y-1,k:2,v:Math.floor(r*983)%2}); // tree
    }
  }
}
function drawDeco(d,sx,sy){
  if(d.k===0){ // grass: swaying blades
    const sway=Math.round(Math.sin(tick*.06+d.x)*1);
    ctx.fillStyle='#166534';
    ctx.fillRect(sx+3,sy+11,1,5); ctx.fillRect(sx+7,sy+10,1,6); ctx.fillRect(sx+11,sy+12,1,4);
    ctx.fillStyle='#4ade80';
    ctx.fillRect(sx+3+sway,sy+9,1,3); ctx.fillRect(sx+7+sway,sy+8,1,3); ctx.fillRect(sx+11+sway,sy+10,1,3);
    if(d.v===2){ ctx.fillStyle='#fbbf24'; ctx.fillRect(sx+5,sy+10,1,1); } // tiny flower
  }else if(d.k===1){ // bush
    ctx.fillStyle='#166534'; ctx.fillRect(sx+2,sy+8,12,8); ctx.fillRect(sx+4,sy+6,8,3);
    ctx.fillStyle='#22c55e'; ctx.fillRect(sx+3,sy+7,5,4); ctx.fillRect(sx+9,sy+9,4,3);
    ctx.fillStyle='#4ade80'; ctx.fillRect(sx+4,sy+7,2,2);
    if(d.v===1){ ctx.fillStyle='#ef4444'; ctx.fillRect(sx+6,sy+10,2,2); ctx.fillRect(sx+11,sy+8,1,1); } // berries
  }else{ // tree: trunk + canopy (occupies 2 tiles up)
    ctx.fillStyle='#78350f'; ctx.fillRect(sx+7,sy+4,3,12);
    ctx.fillStyle='#92400e'; ctx.fillRect(sx+7,sy+4,1,12);
    const cy=sy-10;
    ctx.fillStyle='#166534'; ctx.fillRect(sx+1,cy+4,14,9); ctx.fillRect(sx+3,cy+2,10,3);
    ctx.fillStyle='#22c55e'; ctx.fillRect(sx+2,cy+4,7,5); ctx.fillRect(sx+9,cy+7,5,4);
    ctx.fillStyle='#4ade80'; ctx.fillRect(sx+3,cy+4,3,3);
    if(d.v===1){ ctx.fillStyle='#f97316'; ctx.fillRect(sx+5,cy+8,2,2); ctx.fillRect(sx+11,cy+5,2,2); } // fruit
  }
}

/* ---------- config: keymapping + touch button preferences ---------- */
const DEF_KEYS={left:'ArrowLeft',right:'ArrowRight',jump:'ControlLeft',fire:'AltLeft',jet:'Space',pause:'KeyP'};
let CFG={keys:{...DEF_KEYS},btnSize:1,btnShape:0,swap:false}; // size 0/1/2, shape 0 round 1 square 2 pill
try{ const s=localStorage.getItem('pscastle_cfg'); if(s)CFG=Object.assign(CFG,JSON.parse(s)); CFG.keys=Object.assign({...DEF_KEYS},CFG.keys); }catch(e){}
function saveCfg(){ try{ localStorage.setItem('pscastle_cfg',JSON.stringify(CFG)); }catch(e){} }
const SIZES=[50,66,84], SIZENAME=['SMALL','MEDIUM','LARGE'];
const SHAPES=['ROUND','SQUARE','PILL'];
function prettyKey(code){
  if(!code)return '---';
  return code.replace('Key','').replace('Digit','').replace('Arrow','')
    .replace('ControlLeft','L-CTRL').replace('ControlRight','R-CTRL')
    .replace('AltLeft','L-ALT').replace('AltRight','R-ALT')
    .replace('ShiftLeft','L-SHIFT').replace('ShiftRight','R-SHIFT').toUpperCase();
}
function applyBtnCfg(){
  const t=document.getElementById('touch');
  const bs=SIZES[CFG.btnSize];
  t.style.setProperty('--bs',bs+'px');
  t.style.setProperty('--br',CFG.btnShape===0?'50%':CFG.btnShape===1?'10px':bs*0.5+'px');
  const m=12, g=8;
  const L={tL:[m, m], tR:[m+bs+g, m]};
  const R={tFire:[m+bs*0.95, m], tJump:[m, m+bs*0.55], tJet:[m, m+bs*1.55]};
  const set=(id,side,pos)=>{ const el=document.getElementById(id);
    el.style.left=el.style.right='auto'; el.style[side]=pos[0]+'px'; el.style.bottom=pos[1]+'px'; el.style.top='auto'; };
  const leftSide=CFG.swap?'right':'left', rightSide=CFG.swap?'left':'right';
  set('tL',leftSide,L.tL); set('tR',leftSide,L.tR);
  set('tFire',rightSide,R.tFire); set('tJump',rightSide,R.tJump); set('tJet',rightSide,R.tJet);
  const p=document.getElementById('tPause');
  p.style.left=p.style.bottom='auto'; p.style.right='10px'; p.style.top='10px';
}

/* ---------- game state ---------- */
const SOLID='#=BP', HAZARD='FWV';
const VALUES={g:50,u:150,r:250,c:500,T:1000};
let state='menu';   // menu | settings | remap | play | pause | dying | levelDone | gameover | win
let settingsFrom='menu', remapAction=null;
let level=0, score=0, lives=3, nextLife=20000, hi=0;
try{ hi=parseInt(localStorage.getItem('pscastle_hi')||'0',10)||0; }catch(e){}
function saveHi(){ try{ localStorage.setItem('pscastle_hi',String(hi)); }catch(e){} }

let map=[], mapW=0, monsters=[], pBullet=null, eBullets=[], parts=[], cam=0, camT=0, shake=0;
let banner=0, tick=0, stateT=0, toast='', toastT=0, airT=0, lockedCd=0, deathX=0, deathY=0;
let menuSel=0, setSel=0;
const P={x:0,y:0,vx:0,vy:0,w:10,h:14,face:1,ground:false,
         gun:false,jet:false,jetOn:false,fuel:0,trophy:false,anim:0,startX:0,startY:0};

function loadLevel(n){
  const L=LEVELS[n]; mapW=Math.max(...L.rows.map(r=>r.length));
  map=L.rows.map(r=>r.padEnd(mapW,' ').split(''));
  monsters=[]; eBullets=[]; pBullet=null; parts=[];
  P.gun=false; P.jet=false; P.jetOn=false; P.fuel=0; P.trophy=false; SFX.jetOff();
  for(let y=0;y<ROWS;y++)for(let x=0;x<mapW;x++){
    const ch=map[y][x];
    if(ch==='S'){ P.startX=x*TILE+3; P.startY=y*TILE+2; map[y][x]=' '; }
    if(ch==='M'){ monsters.push({kind:0,x:x*TILE,y:y*TILE,ox:x*TILE,oy:y*TILE,t:Math.random()*99,cool:100,hp:1}); map[y][x]=' '; }
    if(ch==='N'){ monsters.push({kind:1,x:x*TILE,y:y*TILE,ox:x*TILE,oy:y*TILE,t:Math.random()*99,cool:120,hp:1}); map[y][x]=' '; }
    if(ch==='O'){ monsters.push({kind:2,x:x*TILE,y:y*TILE,ox:x*TILE,oy:y*TILE,t:Math.random()*99,cool:140,hp:1}); map[y][x]=' '; }
  }
  buildDeco(n);
  respawn();
}
function respawn(){ P.x=P.startX; P.y=P.startY; P.vx=0; P.vy=0; P.face=1; P.jetOn=false; SFX.jetOff();
  cam=Math.max(0,Math.min(Math.floor(P.x/(9*TILE))*9*TILE, mapW*TILE-W)); camT=cam; }
function startGame(){ score=0; lives=3; level=0; nextLife=20000; loadLevel(0); state='play';
  SFX.start(); toast=LEVELS[0].name; toastT=100; syncPlaying(); }
function syncPlaying(){ document.body.classList.toggle('playing', state==='play'||state==='pause'||state==='dying'||state==='levelDone'); }

function tileAt(px,py){ const tx=Math.floor(px/TILE), ty=Math.floor(py/TILE);
  if(tx<0||tx>=mapW||ty<0||ty>=ROWS)return '#'; return map[ty][tx]; }
function solidAt(px,py){ return SOLID.includes(tileAt(px,py)); }
function addScore(n){ score+=n; if(score>=nextLife){ nextLife+=20000; if(lives<6){lives++; SFX.life(); toast='EXTRA LIFE!'; toastT=90;} } if(score>hi){hi=score; saveHi();} }

/* ---------- input: remap-aware keyboard ---------- */
const K={l:false,r:false,jump:false,fire:false,jetT:false,enter:false,up:false,down:false};
let jumpLatch=false, fireLatch=false, jetLatch=false, enterLatch=false, navLatch=false;
function inMenus(){ return state==='menu'||state==='settings'||state==='gameover'||state==='win'||state==='pause'; }
addEventListener('keydown',e=>{
  audio();
  const c=e.code;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space','ControlLeft','ControlRight','AltLeft','AltRight','Enter'].includes(c))e.preventDefault();
  if(state==='remap'){
    if(c!=='Escape'){ CFG.keys[remapAction]=c; saveCfg(); SFX.select(); }
    state='settings'; return;
  }
  if(c==='KeyM'){ muted=!muted; if(muted)SFX.jetOff(); }
  const km=CFG.keys;
  if(c===km.left)K.l=true;   if(c===km.right)K.r=true;
  if(c===km.jump||c==='ArrowUp')K.jump=true;
  if(c===km.fire)K.fire=true;
  if(c===km.jet)K.jet=K.jetT=true;
  if(c==='ArrowUp')K.up=true; if(c==='ArrowDown')K.down=true;
  if(c==='Enter'||(inMenus()&&c==='Space'))K.enter=true;
  if(c===km.pause||c==='Escape'){
    if(state==='play'){state='pause';menuSel=0;SFX.pause();syncPlaying();}
    else if(state==='pause'){state='play';SFX.pause();syncPlaying();}
  }
});
addEventListener('keyup',e=>{
  const c=e.code, km=CFG.keys;
  if(c===km.left)K.l=false; if(c===km.right)K.r=false;
  if(c===km.jump||c==='ArrowUp')K.jump=false;
  if(c===km.fire)K.fire=false;
  if(c===km.jet)K.jetT=false;
  if(c==='ArrowUp')K.up=false; if(c==='ArrowDown')K.down=false;
  if(c==='Enter'||c==='Space')K.enter=false;
});
const keysDown={};
addEventListener('keydown',e=>keysDown[e.code]=true);
addEventListener('keyup',e=>keysDown[e.code]=false);

/* ---------- touch: in-screen buttons ---------- */
const isTouch=matchMedia('(pointer: coarse)').matches;
if(isTouch)document.body.classList.add('touchmode');
function bindBtn(id,fn){ const el=document.getElementById(id);
  const on=e=>{e.preventDefault(); audio(); el.classList.add('on'); fn(true);};
  const off=e=>{e.preventDefault(); el.classList.remove('on'); fn(false);};
  el.addEventListener('touchstart',on,{passive:false}); el.addEventListener('touchend',off);
  el.addEventListener('touchcancel',off);
  el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
}
bindBtn('tL',d=>K.l=d); bindBtn('tR',d=>K.r=d);
bindBtn('tJump',d=>K.jump=d); bindBtn('tFire',d=>K.fire=d); bindBtn('tJet',d=>K.jetT=d);
bindBtn('tPause',d=>{ if(d){ if(state==='play'){state='pause';menuSel=0;SFX.pause();} else if(state==='pause'){state='play';SFX.pause();} syncPlaying(); }});

/* menu taps: map screen position to internal canvas coords */
let menuRows=[]; // filled by render: {y,h,idx}
function canvasPos(e){
  const r=cv.getBoundingClientRect();
  const t=e.touches&&e.touches[0]?e.touches[0]:e;
  return {x:(t.clientX-r.left)*W/r.width, y:(t.clientY-r.top)*H/r.height};
}
function menuTap(e){
  if(!inMenus()&&state!=='remap')return;
  if(state==='remap'){ e.preventDefault(); audio(); state='settings'; SFX.menu(); return; }
  const p=canvasPos(e);
  for(const row of menuRows){
    if(p.y>=row.y-3&&p.y<=row.y+row.h+3){ e.preventDefault(); audio();
      if(row.idx!==menuSel){menuSel=row.idx; setSel=row.idx;}
      activateMenuItem(); return; }
  }
}
cv.addEventListener('touchstart',menuTap,{passive:false});
cv.addEventListener('mousedown',menuTap);

/* ---------- menu definitions ---------- */
function mainItems(){ return [
  {label:'START GAME', fn:()=>{ startGame(); }},
  {label:'CONTROLS', fn:()=>{ settingsFrom='menu'; setSel=0; state='settings'; }},
  {label:'FULLSCREEN: '+(isFS?'ON':'OFF'), fn:()=>{ toggleFullscreen(); }},
  {label:'SOUND: '+(muted?'OFF':'ON'), fn:()=>{ muted=!muted; if(muted)SFX.jetOff(); }}
];}
function pauseItems(){ return [
  {label:'RESUME', fn:()=>{ state='play'; syncPlaying(); }},
  {label:'RESTART LEVEL', fn:()=>{ loadLevel(level); state='play'; syncPlaying(); }},
  {label:'CONTROLS', fn:()=>{ settingsFrom='pause'; setSel=0; state='settings'; syncPlaying(); }},
  {label:'MAIN MENU', fn:()=>{ state='menu'; menuSel=0; SFX.jetOff(); syncPlaying(); }}
];}
function settingsItems(){
  const it=[
    {label:'JUMP KEY: '+prettyKey(CFG.keys.jump), fn:()=>{remapAction='jump'; state='remap';}},
    {label:'FIRE KEY: '+prettyKey(CFG.keys.fire), fn:()=>{remapAction='fire'; state='remap';}},
    {label:'JETPACK KEY: '+prettyKey(CFG.keys.jet), fn:()=>{remapAction='jet'; state='remap';}},
    {label:'LEFT KEY: '+prettyKey(CFG.keys.left), fn:()=>{remapAction='left'; state='remap';}},
    {label:'RIGHT KEY: '+prettyKey(CFG.keys.right), fn:()=>{remapAction='right'; state='remap';}},
    {label:'PAUSE KEY: '+prettyKey(CFG.keys.pause), fn:()=>{remapAction='pause'; state='remap';}},
    {label:'BUTTON SIZE: '+SIZENAME[CFG.btnSize], fn:()=>{CFG.btnSize=(CFG.btnSize+1)%3; applyBtnCfg(); saveCfg();}},
    {label:'BUTTON SHAPE: '+SHAPES[CFG.btnShape], fn:()=>{CFG.btnShape=(CFG.btnShape+1)%3; applyBtnCfg(); saveCfg();}},
    {label:'LAYOUT: '+(CFG.swap?'SWAPPED':'NORMAL'), fn:()=>{CFG.swap=!CFG.swap; applyBtnCfg(); saveCfg();}},
    {label:'RESET DEFAULTS', fn:()=>{CFG={keys:{...DEF_KEYS},btnSize:1,btnShape:0,swap:false}; applyBtnCfg(); saveCfg();}},
    {label:'< BACK', fn:()=>{ state=settingsFrom; menuSel=0; syncPlaying(); }},
    {label:'MAIN MENU', fn:()=>{ state='menu'; menuSel=0; SFX.jetOff(); syncPlaying(); }}
  ];
  return it;
}
function currentItems(){
  if(state==='menu')return mainItems();
  if(state==='pause')return pauseItems();
  if(state==='settings')return settingsItems();
  return [];
}
function activateMenuItem(){
  if(state==='gameover'||state==='win'){ state='menu'; menuSel=0; syncPlaying(); SFX.select(); return; }
  const items=currentItems(); const idx=(state==='settings')?setSel:menuSel;
  if(items[idx]){ SFX.select(); items[idx].fn(); }
}

/* ---------- physics ---------- */
const GRAV=.25, MOVE=1.5, JUMPV=-4.6, JETV=1.5;
function moveAxis(dx,dy){
  P.x+=dx;
  if(dx){ const edge=dx>0?P.x+P.w:P.x;
    for(const py of [P.y+1,P.y+P.h/2,P.y+P.h-1])
      if(solidAt(edge,py)){ P.x=dx>0?Math.floor(edge/TILE)*TILE-P.w-0.01:(Math.floor(edge/TILE)+1)*TILE+0.01; P.vx=0; }
  }
  P.y+=dy;
  if(dy){ const edge=dy>0?P.y+P.h:P.y;
    for(const px of [P.x+1,P.x+P.w-1])
      if(solidAt(px,edge)){
        if(dy>0){ P.y=Math.floor(edge/TILE)*TILE-P.h-0.01; P.vy=0; P.ground=true; }
        else{ P.y=(Math.floor(edge/TILE)+1)*TILE+0.01; P.vy=0; }
      }
  }
}
function overlapTile(ch){
  for(const px of [P.x+2,P.x+P.w-2]) for(const py of [P.y+3,P.y+P.h-2])
    if(tileAt(px,py)===ch)return {x:Math.floor(px/TILE),y:Math.floor(py/TILE)};
  return null;
}
function boom(x,y,col,n){ for(let i=0;i<n;i++)parts.push({x,y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3-1,t:30+Math.random()*20,col}); }
function die(){ if(state!=='play')return; state='dying'; stateT=0; SFX.jetOff(); SFX.die(); shake=8;
  deathX=P.x+P.w/2; deathY=P.y+P.h/2;
  boom(deathX,deathY,'#f97316',12); boom(deathX,deathY,'#fbbf24',8); }

/* ---------- update ---------- */
function update(){
  tick++;
  if(toastT>0)toastT--;
  if(shake>0)shake*=.85;
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.t--;return p.t>0;});

  if(inMenus()||state==='remap'){
    if(state==='remap')return;
    const items=currentItems();
    if(items.length){
      if((K.up||K.down)&&!navLatch){ navLatch=true; SFX.menu();
        const d=K.up?-1:1;
        if(state==='settings')setSel=(setSel+d+items.length)%items.length;
        else menuSel=(menuSel+d+items.length)%items.length; }
      if(!K.up&&!K.down)navLatch=false;
    }
    if(K.enter&&!enterLatch){ enterLatch=true; activateMenuItem(); }
    if(!K.enter)enterLatch=false;
    return;
  }
  if(state==='dying'){ stateT++; if(stateT>70){ lives--; if(lives<=0){state='gameover'; stateT=0; syncPlaying();} else{respawn(); state='play';} } return; }
  if(state==='levelDone'){ stateT++; if(stateT>110){ level++; if(level>=LEVELS.length){state='win'; stateT=0; syncPlaying();} else{loadLevel(level); state='play'; toast=LEVELS[level].name; toastT=110;} } return; }

  /* --- player --- */
  P.ground=false;
  for(const px of [P.x+1,P.x+P.w-1]) if(solidAt(px,P.y+P.h+0.5))P.ground=true;
  if(P.ground){ if(airT>10)SFX.land(); airT=0; } else airT++;
  if(lockedCd>0)lockedCd--;

  if(K.jetT&&!jetLatch){ jetLatch=true;
    if(P.jet&&P.fuel>0){ P.jetOn=!P.jetOn; if(P.jetOn)SFX.jetOn(); else SFX.jetOff(); } }
  if(!K.jetT)jetLatch=false;

  if(P.jetOn&&P.fuel>0){
    P.fuel-=.06; if(P.fuel<=0){P.fuel=0;P.jetOn=false;SFX.jetOff();}
    P.vx=(K.l?-JETV:0)+(K.r?JETV:0);
    P.vy=0; if(K.jump)P.vy=-JETV; if(keysDown.ArrowDown)P.vy=JETV;
    if(K.l)P.face=-1; if(K.r)P.face=1;
    if(tick%5===0)parts.push({x:P.x+P.w/2-P.face*5,y:P.y+P.h-2,vx:-P.face*.8,vy:.6,t:14,col:tick%10?'#f97316':'#fbbf24'});
  }else{
    P.vx=0; if(K.l){P.vx=-MOVE;P.face=-1;} if(K.r){P.vx=MOVE;P.face=1;}
    if(K.jump&&!jumpLatch&&P.ground){ P.vy=JUMPV; jumpLatch=true; SFX.jump(); }
    if(!K.jump)jumpLatch=false;
    P.vy+=GRAV; if(P.vy>4.5)P.vy=4.5;
    if(P.ground&&P.vx&&tick%14===0)SFX.step();
  }
  moveAxis(P.vx,0); moveAxis(0,P.vy);
  if(P.jetOn)P.anim+=.2; else if(P.vx)P.anim+=.18; else P.anim=0;
  P.x=Math.max(0,Math.min(P.x,mapW*TILE-P.w));
  if(P.y>ROWS*TILE+8)return die();

  /* camera: chunked classic scroll */
  if(camT===cam){
    if(P.x-cam > W-5*TILE) camT=Math.min(cam+9*TILE, mapW*TILE-W);
    if(P.x-cam < 4*TILE && cam>0) camT=Math.max(cam-9*TILE, 0);
  }
  if(cam<camT)cam=Math.min(cam+10,camT);
  if(cam>camT)cam=Math.max(cam-10,camT);

  /* pickups & hazards & door */
  for(const it of 'gurcTGJ'){ const hit=overlapTile(it); if(hit){
    map[hit.y][hit.x]=' ';
    if(it==='T'){ P.trophy=true; addScore(1000); SFX.trophy(); banner=1; boom(hit.x*16+8,hit.y*16+8,'#fbbf24',12); }
    else if(it==='G'){ P.gun=true; SFX.pickup(); toast='GUN!'; toastT=70; }
    else if(it==='J'){ P.jet=true; P.fuel=100; SFX.pickup(); toast='JETPACK! PRESS '+prettyKey(CFG.keys.jet); toastT=110; }
    else{ addScore(VALUES[it]); (it==='g'?SFX.gem:SFX.big)(); boom(hit.x*16+8,hit.y*16+8,'#93c5fd',6); }
  }}
  for(const hz of HAZARD)if(overlapTile(hz))return die();
  const door=overlapTile('D');
  if(door&&P.trophy){ state='levelDone'; stateT=0; addScore(2000); SFX.door(); SFX.jetOff(); }
  else if(door&&!P.trophy&&lockedCd<=0){ SFX.locked(); toast='FIND THE TROPHY FIRST!'; toastT=70; lockedCd=80; }

  /* --- player bullet --- */
  if(K.fire&&!fireLatch){ fireLatch=true;
    if(P.gun&&!pBullet){ pBullet={x:P.x+(P.face>0?P.w:0),y:P.y+7,vx:P.face*4}; SFX.shoot(); } }
  if(!K.fire)fireLatch=false;
  if(pBullet){ pBullet.x+=pBullet.vx;
    if(pBullet.x<cam-8||pBullet.x>cam+W+8||solidAt(pBullet.x,pBullet.y))pBullet=null;
    else for(const m of monsters){ if(m.hp>0&&pBullet&&Math.abs(pBullet.x-(m.x+8))<9&&Math.abs(pBullet.y-(m.y+7))<9){
      m.hp=0; addScore(300); SFX.hitmon(); boom(m.x+8,m.y+8,'#a855f7',12); pBullet=null; } } }

  /* --- monsters --- */
  for(const m of monsters){ if(m.hp<=0)continue; m.t+=.03;
    if(m.kind===0){ m.x=m.ox+Math.sin(m.t*2)*26; }
    if(m.kind===1){ m.y=m.oy+Math.sin(m.t*2)*22; }
    if(m.kind===2){ m.x=m.ox+Math.sin(m.t*1.6)*34; m.y=m.oy+Math.sin(m.t*3.2)*12; }
    m.cool--;
    if(m.cool<=0&&Math.abs(m.x-P.x)<W*0.7){
      const dx=P.x+P.w/2-(m.x+8), dy=P.y+P.h/2-(m.y+7), d=Math.hypot(dx,dy)||1;
      eBullets.push({x:m.x+8,y:m.y+7,vx:dx/d*1.6,vy:dy/d*1.6,t:200}); SFX.eshoot();
      m.cool=110+Math.random()*90;
    }
    if(Math.abs(m.x+8-(P.x+P.w/2))<10&&Math.abs(m.y+7-(P.y+P.h/2))<11)return die();
  }
  eBullets=eBullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; b.t--;
    if(b.t<=0||solidAt(b.x,b.y))return false;
    if(b.x>P.x&&b.x<P.x+P.w&&b.y>P.y&&b.y<P.y+P.h){ die(); return false; }
    return true; });
}

/* ---------- render ---------- */
function drawTileGfx(ch,x,y){
  switch(ch){
    case '#': ctx.drawImage(T_BRICK,x,y); break;
    case '=': ctx.drawImage(T_STONE,x,y); break;
    case 'B': ctx.drawImage(T_BLUE,x,y); break;
    case 'P': ctx.drawImage(T_PIPE,x,y); break;
    case 'D': ctx.drawImage(T_DOOR,x,y);
      if(P.trophy&&(tick>>4)%2){ ctx.fillStyle='rgba(251,191,36,.5)'; ctx.fillRect(x,y,16,2); ctx.fillRect(x,y+14,16,2); }
      break;
    case 'F':{
      ctx.fillStyle='#7f1d1d'; ctx.fillRect(x,y+12,16,4);
      for(let i=0;i<4;i++){ const h=6+Math.sin(tick*.3+x+i*2.1)*3;
        ctx.fillStyle=i%2?'#f97316':'#ef4444'; ctx.fillRect(x+i*4+1,y+12-h,2,h);
        ctx.fillStyle='#fbbf24'; ctx.fillRect(x+i*4+1,y+12-h,2,2); }
      break; }
    case 'W':{
      ctx.fillStyle='#1d4ed8'; ctx.fillRect(x,y+5,16,11);
      ctx.fillStyle='#3b82f6'; ctx.fillRect(x,y+5,16,3);
      ctx.fillStyle='#93c5fd';
      for(let i=0;i<4;i++){ const o=Math.sin(tick*.15+x*.5+i)*1.5; ctx.fillRect(x+i*4,y+5+o,3,1); }
      break; }
    case 'V':{
      ctx.fillStyle='#166534';
      for(let i=0;i<3;i++){ const sway=Math.sin(tick*.12+x+i*2)*2;
        ctx.fillRect(x+3+i*5+sway,y+4,2,12); }
      ctx.fillStyle='#4ade80';
      ctx.fillRect(x+3+Math.sin(tick*.12+x)*2,y+4,2,3);
      ctx.fillRect(x+13+Math.sin(tick*.12+x+4)*2,y+4,2,3);
      break; }
    case 'g': ctx.drawImage(SPR_GEM,x,y+((tick>>4)%2?1:0)); break;
    case 'u': ctx.drawImage(SPR_RUBY,x,y+((tick>>4)%2?0:1)); break;
    case 'r': ctx.drawImage(SPR_RING,x,y+((tick>>4)%2?1:0)); break;
    case 'c': ctx.drawImage(SPR_CROWN,x,y); break;
    case 'T': ctx.drawImage(SPR_TROPHY[(tick>>4)%2],x,y); break;
    case 'G': ctx.drawImage(SPR_GUN,x,y); break;
    case 'J': ctx.drawImage(SPR_JET,x,y); break;
  }
}
function drawHero(){
  let img=HERO_IDLE;
  if(!P.ground&&!P.jetOn)img=HERO_JUMP;
  else if(P.vx||P.jetOn)img=(Math.floor(P.anim)%2)?HERO_W1:HERO_W2;
  const sx=Math.round(P.x-cam)-3, sy=Math.round(P.y)-2+HUD_TOP;
  ctx.save();
  if(P.face<0){ ctx.translate(sx+16,sy); ctx.scale(-1,1); ctx.drawImage(img,0,0); }
  else ctx.drawImage(img,sx,sy);
  ctx.restore();
  if(P.jet){ ctx.fillStyle='#94a3b8'; ctx.fillRect(sx+(P.face>0?2:11),sy+6,3,6); }
}
function hud(){
  ctx.fillStyle='#0d0d14'; ctx.fillRect(0,0,W,HUD_TOP); ctx.fillRect(0,H-HUD_BOT,W,HUD_BOT);
  ctx.fillStyle='#2dd4bf'; ctx.fillRect(0,HUD_TOP-1,W,1); ctx.fillRect(0,H-HUD_BOT,W,1);
  text('SCORE',6,4,'#94a3b8'); text(String(score).padStart(6,'0'),6,11,'#f4f4f4');
  textC('LEVEL',W/2,4,'#94a3b8'); textC(String(level+1).padStart(2,'0'),W/2,11,'#f4f4f4');
  text('HI',W-100,4,'#94a3b8'); text(String(hi).padStart(6,'0'),W-100,11,'#fbbf24');
  text('PS',W-40,4,'#94a3b8');
  for(let i=0;i<lives;i++){ ctx.fillStyle='#2dd4bf'; ctx.fillRect(W-40+i*7,12,5,5); ctx.fillStyle='#f97316'; ctx.fillRect(W-40+i*7+1,11,3,1); }
  if(P.gun){ ctx.drawImage(SPR_GUN,4,H-HUD_BOT+1); text('GUN',22,H-HUD_BOT+8,'#f4f4f4'); }
  if(P.jet){ text('JET',W-96,H-HUD_BOT+8,'#f4f4f4');
    ctx.fillStyle='#334155'; ctx.fillRect(W-78,H-HUD_BOT+8,60,5);
    ctx.fillStyle=P.fuel>25?'#2dd4bf':'#ef4444'; ctx.fillRect(W-78,H-HUD_BOT+8,Math.max(0,P.fuel*.6),5); }
  if(P.trophy){ if((tick>>4)%2){ ctx.drawImage(T_DOOR,W/2-58,H-HUD_BOT+3);
      text('GO THRU THE DOOR!',W/2-38,H-HUD_BOT+8,'#fbbf24'); } }
  else if(toastT<=0)textC(LEVELS[level]?LEVELS[level].name:'',W/2,H-HUD_BOT+8,'#475569');
  if(toastT>0)textC(toast,W/2,H-HUD_BOT+8,'#4ade80');
}
function bg(){
  const grad=ctx.createLinearGradient(0,HUD_TOP,0,HUD_TOP+FIELD_H);
  grad.addColorStop(0,'#101024'); grad.addColorStop(1,'#1a1030');
  ctx.fillStyle=grad; ctx.fillRect(0,HUD_TOP,W,FIELD_H);
  ctx.fillStyle='rgba(255,255,255,.25)';
  for(let i=0;i<26;i++){ const x=((i*53-cam*.3)%W+W)%W, y=HUD_TOP+(i*37)%FIELD_H;
    ctx.fillRect(x,y,1,1); }
}
function scene(){
  bg();
  const ox=Math.round(cam), first=Math.floor(ox/TILE), last=first+VIEW_TILES+1;
  for(let ty=0;ty<ROWS;ty++)for(let tx=first;tx<=last&&tx<mapW;tx++){
    const ch=map[ty][tx]; if(ch!==' ')drawTileGfx(ch,tx*TILE-ox,ty*TILE+HUD_TOP);
  }
  for(const d of deco){ if(d.x>=first-1&&d.x<=last)drawDeco(d,d.x*TILE-ox,d.y*TILE+HUD_TOP); }
  for(const m of monsters){ if(m.hp<=0)continue;
    const set=[MON_SPIDER,MON_ORB,MON_BAT][m.kind];
    ctx.drawImage(set[(tick>>3)%2],Math.round(m.x-ox),Math.round(m.y)+HUD_TOP); }
  if(pBullet){ ctx.fillStyle='#f4f4f4'; ctx.fillRect(Math.round(pBullet.x-ox),Math.round(pBullet.y)+HUD_TOP,4,2); }
  ctx.fillStyle='#ef4444';
  for(const b of eBullets){ ctx.fillRect(Math.round(b.x-ox)-1,Math.round(b.y)+HUD_TOP-1,3,3); }
  if(state!=='dying')drawHero();
  else{
    const dx=Math.round(deathX-ox), dy=Math.round(deathY)+HUD_TOP, a=stateT*.45, R=5+Math.sin(stateT*.3)*2;
    for(let i=0;i<8;i++){ const ang=a+i*Math.PI/4;
      ctx.fillStyle=i%2?'#fbbf24':'#f97316';
      ctx.fillRect(dx+Math.cos(ang)*R-1, dy+Math.sin(ang)*R-1, 3,3); }
    ctx.fillStyle='#f4f4f4'; ctx.fillRect(dx-2,dy-2,4,4);
  }
  for(const p of parts){ ctx.fillStyle=p.col; ctx.fillRect(Math.round(p.x-ox),Math.round(p.y)+HUD_TOP,2,2); }
}
/* ---------- menu rendering ---------- */
function drawMenuList(items,sel,y0,step){
  menuRows=[];
  items.forEach((it,i)=>{
    const y=y0+i*step;
    const col=i===sel?'#fbbf24':'#cbd5e1';
    if(i===sel)textC('> '+it.label+' <',W/2,y,col);
    else textC(it.label,W/2,y,col);
    menuRows.push({y,h:6,idx:i});
  });
}
function castleBackdrop(){
  ctx.fillStyle='#1a1030'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,.22)';
  for(let i=0;i<40;i++)ctx.fillRect((i*89)%W,(i*53)%H,1,1);
  ctx.fillStyle='#0d0d18';
  ctx.fillRect(30,H-56,260,56);
  for(let i=0;i<13;i++)ctx.fillRect(34+i*20,H-64,10,8);
  ctx.fillRect(60,H-92,26,92); ctx.fillRect(234,H-92,26,92);
  for(let i=0;i<2;i++){ctx.fillRect(62+i*8,H-100,6,8);ctx.fillRect(236+i*8,H-100,6,8);}
  ctx.fillStyle='#fbbf24'; ctx.fillRect(150,H-36,20,22);
  ctx.fillStyle='#f97316'; ctx.fillRect(154,H-32,12,18);
}
function render(){
  ctx.save();
  if(shake>0.5)ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  ctx.fillStyle='#000'; ctx.fillRect(-8,-8,W+16,H+16);

  if(state==='menu'){
    castleBackdrop();
    const bounce=Math.sin(tick*.05)*2;
    textC('P S',W/2,16+bounce,'#2dd4bf',4);
    textC('CASTLE',W/2,42+bounce,'#f97316',4);
    textC('CREATED AND DEVELOPED BY',W/2,72,'#94a3b8');
    textC('PRASANTH SUNDAR',W/2,81,'#fbbf24');
    drawMenuList(mainItems(),menuSel,100,13);
    text('HI '+String(hi).padStart(6,'0'),6,H-10,'#fbbf24');
    ctx.restore(); return;
  }
  if(state==='settings'||state==='remap'){
    castleBackdrop();
    textC('CONTROLS',W/2,10,'#2dd4bf',2);
    if(state==='remap'){
      menuRows=[];
      textC('PRESS A KEY FOR',W/2,60,'#f4f4f4');
      textC(remapAction.toUpperCase(),W/2,74,'#fbbf24',2);
      textC(isTouch?'TAP ANYWHERE TO CANCEL':'ESC TO CANCEL',W/2,96,'#64748b');
      textC('KEY REMAP IS FOR KEYBOARDS',W/2,110,'#475569');
    }else{
      drawMenuList(settingsItems(),setSel,24,13);
      textC('TOUCH OPTIONS APPLY ON MOBILE',W/2,H-10,'#475569');
    }
    ctx.restore(); return;
  }

  scene(); hud();
  if(state==='pause'){
    ctx.fillStyle='rgba(6,6,14,.82)'; ctx.fillRect(0,HUD_TOP,W,FIELD_H);
    textC('PAUSED',W/2,HUD_TOP+16,'#f4f4f4',2);
    drawMenuList(pauseItems(),menuSel,HUD_TOP+48,15);
  }
  if(state==='levelDone'){ ctx.fillStyle='rgba(6,6,14,.78)'; ctx.fillRect(0,HUD_TOP,W,FIELD_H);
    textC('LEVEL '+(level+1)+' CLEAR!',W/2,HUD_TOP+60,'#4ade80',2); }
  if(state==='gameover'){ ctx.fillStyle='rgba(6,6,14,.82)'; ctx.fillRect(0,HUD_TOP,W,FIELD_H);
    textC('GAME OVER',W/2,HUD_TOP+42,'#ef4444',3);
    textC('SCORE '+String(score).padStart(6,'0'),W/2,HUD_TOP+80,'#f4f4f4');
    if((tick>>5)%2)textC(isTouch?'TAP FOR MENU':'PRESS ENTER FOR MENU',W/2,HUD_TOP+100,'#94a3b8');
    menuRows=[{y:HUD_TOP+100,h:8,idx:0}];
  }
  if(state==='win'){ ctx.fillStyle='rgba(6,6,14,.82)'; ctx.fillRect(0,HUD_TOP,W,FIELD_H);
    textC('YOU SAVED',W/2,HUD_TOP+30,'#fbbf24',2);
    textC('P S CASTLE!',W/2,HUD_TOP+52,'#2dd4bf',3);
    textC('SCORE '+String(score).padStart(6,'0'),W/2,HUD_TOP+92,'#f4f4f4');
    if((tick>>5)%2)textC(isTouch?'TAP FOR MENU':'PRESS ENTER FOR MENU',W/2,HUD_TOP+112,'#94a3b8');
    menuRows=[{y:HUD_TOP+112,h:8,idx:0}];
  }
  ctx.restore();
}

/* ---------- main loop (fixed timestep) ---------- */
let last=0, acc=0; const STEP=1000/60;
function loop(t){
  requestAnimationFrame(loop);
  if(!last)last=t; acc+=Math.min(t-last,100); last=t;
  while(acc>=STEP){ update(); acc-=STEP; }
  render();
}
requestAnimationFrame(loop);

/* ---------- PWA: offline support + Android auto-fullscreen ---------- */
if('serviceWorker' in navigator){
  addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
let fsAsked=false;
function autoFS(){
  if(fsAsked||!isTouch)return; fsAsked=true;
  if(!document.fullscreenElement&&!navigator.standalone&&!matchMedia('(display-mode: fullscreen)').matches){
    const el=document.documentElement;
    (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el);
  }
}
document.addEventListener('touchstart',autoFS,{once:true});
</script>
